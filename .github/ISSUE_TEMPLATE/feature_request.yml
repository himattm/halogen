name: Feature Request
description: Suggest a new feature for Halogen
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've considered?
    validations:
      required: false
  - type: dropdown
    id: module
    attributes:
      label: Related Module
      options:
        - halogen-core
        - halogen-engine
        - halogen-compose
        - halogen-provider-nano
        - New module
        - Not sure
    validations:
      required: false
